<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>COBRA - Policy Module</title>
  <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.latest.min.js"></script>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div id="calc-view">
    <p class="intro">Health impacts from policy-driven pollutant changes. Reads "Pollutants reduced from Fuel Use" and "Pollutants from Grid use" worksheets.</p>
    <div class="btn-row">
      <button id="calculate" class="primary">Calculate Health Impacts</button>
    </div>
    <div id="init-status" style="font-size:11px;color:#888;margin-top:4px;"></div>
    <div style="font-size:9px;color:#aaa;">v2026.04.09a</div>
  </div>

  <div id="results-view" style="display:none">
    <div id="results"></div>
    <div class="btn-row">
      <button id="reset">Run Another Calculation</button>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    (function () {
      var FUEL_WS_PATTERNS = ["pollutants reduced from fuel", "fuel use", "policy_natural", "ps_pollu"];
      var GRID_WS_PATTERNS = ["pollutants from grid", "grid use", "electric_gain", "ps_grid", "grid_pollu"];
      // "Select State" and "County?" are known-stale params on this dashboard — keep them last
      var STATE_PARAMS = ["In.State", "State", "State_Abbr", "State_Region", "State/Grid Region", "COBRA_State", "Select State"];
      var COUNTY_PARAMS = ["In.County Name.2", "County", "County Selection", "County_Name", "COBRA_County", "County?"];

      var dashboard = null;

      function matchesPatterns(name, patterns) {
        var n = (name || "").toLowerCase();
        for (var i = 0; i < patterns.length; i++) {
          if (n.indexOf(patterns[i]) >= 0) return true;
        }
        return false;
      }

      function addVote(votes, value) {
        var val = value == null ? "" : String(value).trim();
        if (!val) return;
        votes[val] = (votes[val] || 0) + 1;
      }

      function chooseMajorityValue(votes) {
        var best = null;
        var bestCount = 0;
        for (var key in votes) {
          if (votes[key] > bestCount) {
            best = key;
            bestCount = votes[key];
          }
        }
        return best;
      }

      function formatVoteSummary(votes) {
        var parts = [];
        for (var key in votes) {
          parts.push(key + " x" + votes[key]);
        }
        return parts.length ? parts.join(", ") : "(none)";
      }

      var calcBtn = document.getElementById("calculate");
      calcBtn.disabled = true;
      calcBtn.textContent = "Initializing...";

      COBRA.initExtension(function (db) {
        dashboard = db;
        calcBtn.disabled = false;
        calcBtn.textContent = "Calculate Health Impacts";
        if (!dashboard) {
          document.getElementById("results").innerHTML =
            '<div class="status-msg info">Not in Tableau — will use test data.</div>';
          document.getElementById("results-view").style.display = "block";
        }
      });

      calcBtn.addEventListener("click", async function () {
        var btn = this;
        var resultsDiv = document.getElementById("results");
        btn.disabled = true;
        resultsDiv.innerHTML = '<div class="results-box"><p class="loading">Reading policy data and calculating health impacts... This may take 1\u20132 minutes.</p></div>';
        document.getElementById("results-view").style.display = "block";

        try {
          var payload = {};
          var debugLines = [];

          if (dashboard) {
            var params = await dashboard.getParametersAsync();
            debugLines.push("Parameters found: " + params.map(function(p) {
              var v = p.currentValue;
              var val = v ? (v.nativeValue !== undefined ? v.nativeValue : v.value) : "(empty)";
              return p.name + " = " + val;
            }).join(", "));

            // --- Read pollutant data from worksheets ---
            var emissionsByFuel = {};
            var worksheets = dashboard.worksheets || [];
            var dataWorksheets = []; // track which worksheets we read data from
            debugLines.push("Worksheets: " + worksheets.map(function(w) { return '"' + w.name + '"'; }).join(", "));

            for (var i = 0; i < worksheets.length; i++) {
              var ws = worksheets[i];
              var name = ws.name || "";

              if (matchesPatterns(name, FUEL_WS_PATTERNS)) {
                dataWorksheets.push(ws);
                var fuelData = await COBRA.readWorksheetPollutantsByColumns(ws);
                if (fuelData) {
                  if (!emissionsByFuel.natural_gas) emissionsByFuel.natural_gas = { PM25: 0, SO2: 0, NOx: 0, VOC: 0 };
                  emissionsByFuel.natural_gas.PM25 += fuelData.PM25;
                  emissionsByFuel.natural_gas.SO2 += fuelData.SO2;
                  emissionsByFuel.natural_gas.NOx += fuelData.NOx;
                  emissionsByFuel.natural_gas.VOC += fuelData.VOC;
                  debugLines.push('natural_gas (from "' + name + '"): PM25=' + fuelData.PM25 + ' SO2=' + fuelData.SO2 + ' NOx=' + fuelData.NOx + ' VOC=' + fuelData.VOC);
                } else {
                  debugLines.push('"' + name + '" matched fuel pattern but no pollutant data found');
                }
              } else if (matchesPatterns(name, GRID_WS_PATTERNS)) {
                dataWorksheets.push(ws);
                var gridData = await COBRA.readWorksheetPollutantsByColumns(ws);
                if (gridData) {
                  if (!emissionsByFuel.grid) emissionsByFuel.grid = { PM25: 0, SO2: 0, NOx: 0, VOC: 0 };
                  emissionsByFuel.grid.PM25 += gridData.PM25;
                  emissionsByFuel.grid.SO2 += gridData.SO2;
                  emissionsByFuel.grid.NOx += gridData.NOx;
                  emissionsByFuel.grid.VOC += gridData.VOC;
                  debugLines.push('grid (from "' + name + '"): PM25=' + gridData.PM25 + ' SO2=' + gridData.SO2 + ' NOx=' + gridData.NOx + ' VOC=' + gridData.VOC);
                } else {
                  debugLines.push('"' + name + '" matched grid pattern but no pollutant data found');
                }
              } else {
                debugLines.push('"' + name + '" — no pattern match, skipping');
              }
            }

            // --- Resolve state/county ---
            // The policy dashboard has stale Tableau parameters ("Select State",
            // "County?") that don't reflect the user's current selection.  The
            // user's actual selection is through dashboard filter cards tied to
            // data fields "In.State" and "In.County Name.2".  So: read filters
            // first (from the data worksheets), then fall back to params only as
            // a last resort.
            var STATE_FILTER_NAMES = ["In.State", "State Selection", "State", "State/Grid Region"];
            var COUNTY_FILTER_NAMES = ["In.County Name.2", "County Selection", "County", "County?"];

            var state = null;
            var county = null;

            var STATE_FIELDS = ["In.State", "State", "State_Abbr", "State Selection"];
            var COUNTY_FIELDS = ["In.County Name.2", "County", "County Name", "County Selection"];

            // 1) Read from filters on data worksheets specifically (not all worksheets)
            var allDataFilters = []; // collect for broad fallback
            var stateVotes = {};
            var countyVotes = {};
            var stateFilterFoundOnDataWorksheets = false;
            var countyFilterFoundOnDataWorksheets = false;
            if (!state || !county) {
              for (var d = 0; d < dataWorksheets.length; d++) {
                try {
                  var wsFilters = await dataWorksheets[d].getFiltersAsync();
                  debugLines.push("Filters on '" + dataWorksheets[d].name + "': " +
                    wsFilters.map(function(f) {
                      var vals = (f.appliedValues || []).map(function(v) {
                        return v.nativeValue !== undefined ? v.nativeValue : (v.value || v.formattedValue);
                      });
                      return f.fieldName + " (" + vals.length + " vals" + (vals.length === 1 ? ": " + vals[0] : "") + ")";
                    }).join(", "));
                  for (var f = 0; f < wsFilters.length; f++) {
                    var filter = wsFilters[f];
                    allDataFilters.push({ filter: filter, wsName: dataWorksheets[d].name });
                    var fname = (filter.fieldName || "").toLowerCase();
                    for (var sn = 0; sn < STATE_FILTER_NAMES.length; sn++) {
                      if (COBRA.fieldNameMatches(fname, STATE_FILTER_NAMES[sn].toLowerCase())) {
                        stateFilterFoundOnDataWorksheets = true;
                        if (filter.appliedValues && filter.appliedValues.length === 1) {
                          var sv = filter.appliedValues[0];
                          var stateCandidate = String(sv.nativeValue !== undefined ? sv.nativeValue : (sv.value || sv.formattedValue)).trim();
                          addVote(stateVotes, stateCandidate);
                          debugLines.push("State candidate from filter '" + filter.fieldName + "' on '" + dataWorksheets[d].name + "': " + stateCandidate);
                        }
                        break;
                      }
                    }
                    for (var cn = 0; cn < COUNTY_FILTER_NAMES.length; cn++) {
                      if (COBRA.fieldNameMatches(fname, COUNTY_FILTER_NAMES[cn].toLowerCase())) {
                        countyFilterFoundOnDataWorksheets = true;
                        if (filter.appliedValues && filter.appliedValues.length === 1) {
                          var cv = filter.appliedValues[0];
                          var countyCandidate = String(cv.nativeValue !== undefined ? cv.nativeValue : (cv.value || cv.formattedValue)).trim();
                          addVote(countyVotes, countyCandidate);
                          debugLines.push("County candidate from filter '" + filter.fieldName + "' on '" + dataWorksheets[d].name + "': " + countyCandidate);
                        }
                        break;
                      }
                    }
                  }
                } catch (e) {
                  debugLines.push("Error reading filters from '" + dataWorksheets[d].name + "': " + e.message);
                }
              }
            }
            if (!state) {
              state = chooseMajorityValue(stateVotes);
              if (state) debugLines.push("State chosen from data worksheet filters: " + state + " [" + formatVoteSummary(stateVotes) + "]");
              else if (stateFilterFoundOnDataWorksheets) debugLines.push("State filters found on data worksheets, but no single selected value was available");
            }
            if (!county) {
              county = chooseMajorityValue(countyVotes);
              if (county) debugLines.push("County chosen from data worksheet filters: " + county + " [" + formatVoteSummary(countyVotes) + "]");
              else if (countyFilterFoundOnDataWorksheets) debugLines.push("County filters found on data worksheets, but no single selected value was available");
            }
            debugLines.push("After data worksheet filters: State=" + (state || "(none)") + ", County=" + (county || "(none)"));

            // 1b) Broad fallback: if targeted matching missed, look for any filter
            //     whose name contains "state" or "county" with a plausible single value.
            //     This catches unknown Tableau field name patterns we haven't seen yet.
            if (!state) {
              var broadStateVotes = {};
              for (var bf = 0; bf < allDataFilters.length; bf++) {
                var bFilter = allDataFilters[bf].filter;
                var bName = (bFilter.fieldName || "").toLowerCase();
                if (bName.indexOf("state") >= 0 && bFilter.appliedValues && bFilter.appliedValues.length === 1) {
                  var bv = bFilter.appliedValues[0];
                  var bVal = String(bv.nativeValue !== undefined ? bv.nativeValue : (bv.value || bv.formattedValue)).trim();
                  // Accept 2-letter state abbreviations only (avoid matching e.g. "Statewide")
                  if (/^[A-Za-z]{2}$/.test(bVal)) {
                    addVote(broadStateVotes, bVal.toUpperCase());
                    debugLines.push("Broad state candidate from '" + bFilter.fieldName + "' on '" + allDataFilters[bf].wsName + "': " + bVal.toUpperCase());
                  }
                }
              }
              state = chooseMajorityValue(broadStateVotes);
              if (state) debugLines.push("State chosen from broad filter fallback: " + state + " [" + formatVoteSummary(broadStateVotes) + "]");
            }
            if (!county) {
              var broadCountyVotes = {};
              for (var bf = 0; bf < allDataFilters.length; bf++) {
                var bFilter = allDataFilters[bf].filter;
                var bName = (bFilter.fieldName || "").toLowerCase();
                if (bName.indexOf("county") >= 0 && bFilter.appliedValues && bFilter.appliedValues.length === 1) {
                  var bv = bFilter.appliedValues[0];
                  var bVal = String(bv.nativeValue !== undefined ? bv.nativeValue : (bv.value || bv.formattedValue)).trim();
                  if (bVal) {
                    addVote(broadCountyVotes, bVal);
                    debugLines.push("Broad county candidate from '" + bFilter.fieldName + "' on '" + allDataFilters[bf].wsName + "': " + bVal);
                  }
                }
              }
              county = chooseMajorityValue(broadCountyVotes);
              if (county) debugLines.push("County chosen from broad filter fallback: " + county + " [" + formatVoteSummary(broadCountyVotes) + "]");
            }

            // 2) Fall back to filters on ALL worksheets
            if (!state) {
              var filterState = await COBRA.findFilterValue(dashboard, STATE_FILTER_NAMES);
              if (filterState) {
                state = filterState;
                debugLines.push("State from global filter search: " + state);
              }
            }
            if (!county) {
              var filterCounty = await COBRA.findFilterValue(dashboard, COUNTY_FILTER_NAMES);
              if (filterCounty) {
                county = filterCounty;
              } else {
                var countyFilterExists = await COBRA.findFilterExists(dashboard, COUNTY_FILTER_NAMES);
                if (countyFilterExists) {
                  debugLines.push("County filter exists but no single value selected — treating as state-level");
                  county = null;
                }
              }
            }

            // 3) Fall back to worksheet data only if it has a single unambiguous value.
            if (!state) {
              for (var d = 0; d < dataWorksheets.length && !state; d++) {
                state = await COBRA.readDimensionFromData(dataWorksheets[d], STATE_FIELDS);
              }
            }
            if (!county) {
              for (var d = 0; d < dataWorksheets.length && !county; d++) {
                county = await COBRA.readDimensionFromData(dataWorksheets[d], COUNTY_FIELDS);
              }
            }
            debugLines.push("After worksheet data fallback: State=" + (state || "(none)") + ", County=" + (county || "(none)"));

            // 4) Last resort: params (may be stale — used only if filters/data found nothing)
            if (!state) {
              state = COBRA.findParamValue(params, STATE_PARAMS);
              if (state) debugLines.push("State from params (last resort): " + state);
            }
            if (!county) {
              county = COBRA.findParamValue(params, COUNTY_PARAMS);
              if (county) debugLines.push("County from params (last resort): " + county);
            }

            county = COBRA.normalizeCountyForPayload(county);
            debugLines.push("Using: State=" + (state || "(none)") + ", County=" + (county || "(none)"));

            if (state) {
              payload.state = String(state);
              if (county) payload.county_name = String(county);
            } else {
              payload.region = "national";
            }
            payload.emissions_by_fuel = emissionsByFuel;
          } else {
            payload = {
              state: "NY",
              emissions_by_fuel: {
                natural_gas: { PM25: 0.8, SO2: 0.3, NOx: 0.5, VOC: 0.1 },
                grid: { PM25: 0.5, SO2: 0.2, NOx: 0.3, VOC: 0.05 }
              }
            };
            debugLines.push("Test mode (not in Tableau)");
          }

          resultsDiv.innerHTML = '<div class="results-box"><p class="loading">Sending to API...</p>' +
            '<pre style="font-size:11px;color:#555;white-space:pre-wrap;margin-top:8px;">' +
            debugLines.join("\n") + "\n\nPayload: " + JSON.stringify(payload, null, 2) + '</pre></div>';

          if (!payload.emissions_by_fuel || Object.keys(payload.emissions_by_fuel).length === 0) {
            throw new Error("No pollutant data found. Ensure worksheets for fuel and grid pollutants exist.\n\n" + debugLines.join("\n"));
          }

          var data = await COBRA.callHealthEffects(payload, true, "policy_module");
          await COBRA.storeResults(data, "policy_module");

          // Show per-fuel results
          var geo = data.county ? "county" : (data.state ? "state" : "national");
          var d = data[geo] || {};
          var bySector = d.by_sector || {};
          var html = '';
          var fuelLabels = { grid: "Grid / Electricity", natural_gas: "Fuel Use" };
          for (var fk in bySector) {
            var sv = bySector[fk];
            var label = fuelLabels[fk] || COBRA.sectorLabel(fk);
            html += '<div class="result-row"><strong>' + label + ' (Low):</strong> <span class="val">' + COBRA.formatCurrency(sv.TotalHealthBenefitsValue_low) + '</span></div>';
            html += '<div class="result-row"><strong>' + label + ' (High):</strong> <span class="val">' + COBRA.formatCurrency(sv.TotalHealthBenefitsValue_high) + '</span></div>';
          }
          html += '<details style="margin-top:12px;font-size:11px;color:#888;"><summary>Debug info</summary><pre style="white-space:pre-wrap;">' +
            debugLines.join("\n") + "\n\nPayload sent: " + JSON.stringify(payload, null, 2) + '</pre></details>';
          resultsDiv.innerHTML = '<div class="results-box teal">' + html + '</div>';
          document.getElementById("calc-view").style.display = "none";

        } catch (e) {
          resultsDiv.innerHTML = '<div class="results-box"><p class="error">Error: ' + e.message + '</p>' +
            '<details open style="margin-top:12px;font-size:11px;color:#888;"><summary>Debug info</summary><pre style="white-space:pre-wrap;">' +
            (debugLines || []).join("\n") + "\n\nPayload: " + JSON.stringify(payload, null, 2) + '</pre></details></div>';
        } finally {
          btn.disabled = false;
        }
      });

      document.getElementById("reset").addEventListener("click", function () {
        document.getElementById("calc-view").style.display = "block";
        document.getElementById("results-view").style.display = "none";
        document.getElementById("results").innerHTML = "";
      });
    })();
  </script>
</body>
</html>
